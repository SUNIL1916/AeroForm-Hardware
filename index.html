<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroForm Flight Controller - Live Interactive PCB</title>
    
    <script type="module" src="https://unpkg.com/@theacodes/kicanvas@0.6.0/dist/kicanvas.js"></script>
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #131a2c;
            --accent-color: #0ea5e9;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation Header Branding */
        .navbar {
            background-color: var(--panel-color);
            border-bottom: 2px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            box-sizing: border-box;
        }

        .branding h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .branding h1 span {
            color: var(--accent-color);
        }

        .branding p {
            margin: 3px 0 0 0;
            font-size: 12px;
            color: var(--text-sub);
        }

        .status-badge {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Main Workspace Container */
        .workspace {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: calc(100vh - 70px);
        }

        /* The PCB Interactive Window Box */
        .viewer-card {
            flex: 1;
            background-color: var(--panel-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* Full Screen Rendering Area for the Component Vector Engine */
        .canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #151c2e;
        }

        ki-canvas {
            display: block;
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        /* Instructions Bar for Judges */
        .control-bar {
            background-color: #1a233d;
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            font-size: 13px;
            color: var(--text-sub);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .instruction-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .key-cap {
            background: #0b0f19;
            border: 1px solid #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #fff;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="branding">
            <h1>🛸 AeroForm <span>Avionics Tracking Unit</span></h1>
            <p>Automated Generative Hardware System Architecture Engine v10.0</p>
        </div>
        <div class="status-badge">
            ● SYSTEM ONLINE
        </div>
    </header>

    <main class="workspace">
        <div class="viewer-card">
            <div class="canvas-container">
                <ki-canvas src="https://raw.githubusercontent.com/SUNIL1916/AeroForm-Hardware/main/pcb.kicad_pcb"></ki-canvas>
            </div>
            
            <div class="control-bar">
                <span style="font-weight: 600; color: var(--text-main);">Console Help:</span>
                <div class="instruction-item">
                    <span class="key-cap">Left Click + Drag</span> Move Board View
                </div>
                <div class="instruction-item">
                    <span class="key-cap">Scroll Wheel</span> Zoom In/Out
                </div>
                <div class="instruction-item">
                    <span class="key-cap">Layers Panel</span> Toggle Traces & Tracks
                </div>
            </div>
        </div>
    </main>

</body>
</html>
