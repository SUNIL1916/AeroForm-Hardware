<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroForm Flight Controller - Interactive PCB Review</title>
    <script type="module" src="https://unpkg.com/@theacodes/kicanvas@0.x.x/dist/kicanvas.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }
        h1 { margin: 0 0 5px 0; color: #38bdf8; font-size: 24px; }
        p { margin: 0; color: #94a3b8; font-size: 14px; }
        .viewer-container {
            max-width: 1200px;
            height: 75px; /* Holds the board beautifully */
            margin: 0 auto;
            border: 2px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            background-color: #1e293b;
        }
        /* Style the custom interactive canvas element */
        ki-canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛸 AeroForm Avionics Tracking Unit</h1>
        <p>Interactive Judge Console • Generated via Automated Hardware Python Engine</p>
    </div>

    <div class="viewer-container">
        <ki-canvas src="./pcb.kicad_pcb"></ki-canvas>
    </div>

</body>
</html>
